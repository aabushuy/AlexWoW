# AlexWoW — стек для домашнего сервера (homeserver, 192.168.2.210).
# Сборка ЛОКАЛЬНАЯ (см. deploy/deploy.ps1): образы только COPY готовых бинарников.
services:
  alexwow-mysql:
    image: mysql:8.4
    container_name: alexwow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-<rotate-me>}
      MYSQL_DATABASE: alexwow_auth
      MYSQL_USER: ${MYSQL_USER:-alexwow}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-alexwow}
    ports:
      - "3306:3306"   # MySQL наружу — подключение с LAN (DBeaver/Workbench и т.п.)
    volumes:
      - alexwow-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-<rotate-me>}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - alexwow

  alexwow-auth:
    build:
      context: .
      dockerfile: Dockerfile.auth
    container_name: alexwow-auth
    restart: unless-stopped
    environment:
      AuthServer__ConnectionString: "Server=alexwow-mysql;Port=3306;Database=alexwow_auth;User ID=${MYSQL_USER:-alexwow};Password=${MYSQL_PASSWORD:-alexwow};"
      # IP world-сервера, который увидит клиент (LAN-адрес homeserver).
      AuthServer__DefaultRealm__Address: ${REALM_ADDRESS:-192.168.2.210}
    ports:
      - "3724:3724"   # сырой TCP логин-протокола
    depends_on:
      alexwow-mysql:
        condition: service_healthy
    networks:
      - alexwow

  alexwow-world:
    build:
      context: .
      dockerfile: Dockerfile.world
    container_name: alexwow-world
    restart: unless-stopped
    environment:
      WorldServer__ConnectionString: "Server=alexwow-mysql;Port=3306;Database=alexwow_auth;User ID=${MYSQL_USER:-alexwow};Password=${MYSQL_PASSWORD:-alexwow};"
      # БД мира (дамп CMaNGOS): creature, creature_template …
      WorldServer__WorldConnectionString: "Server=alexwow-mysql;Port=3306;Database=mangos;User ID=${MYSQL_USER:-alexwow};Password=${MYSQL_PASSWORD:-alexwow};"
      # Рельеф: каталог с maps/*.map (экстрактор CMaNGOS). Пусто/нет каталога — без рельефа.
      WorldServer__MapsPath: "/data/maps"
      WorldServer__VmapsPath: "/data/vmaps"   # коллизии (LoS)
      WorldServer__MmapsPath: "/data/mmaps"   # навмеш (поиск пути)
    ports:
      - "8085:8085"   # сырой TCP world-протокола
    volumes:
      # Данные мира на хосте, ВНЕ каталога деплоя (deploy.ps1 делает rm -rf деплой-каталога!).
      - /data/docker/alexwow-maps:/data/maps:ro
      - /data/docker/alexwow-vmaps:/data/vmaps:ro
      - /data/docker/alexwow-mmaps:/data/mmaps:ro
    depends_on:
      alexwow-mysql:
        condition: service_healthy
    networks:
      - alexwow

  alexwow-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: alexwow-web
    restart: unless-stopped
    environment:
      # Та же БД alexwow_auth, что и у игровых серверов (общие аккаунты/персонажи).
      Web__ConnectionString: "Server=alexwow-mysql;Port=3306;Database=alexwow_auth;User ID=${MYSQL_USER:-alexwow};Password=${MYSQL_PASSWORD:-alexwow};"
      # БД трекинга прогресса (дашборд, срез 1). Создаётся вручную: deploy/sql/project-schema.sql + project-seed.sql.
      Web__ProjectConnectionString: "Server=alexwow-mysql;Port=3306;Database=project;User ID=${MYSQL_USER:-alexwow};Password=${MYSQL_PASSWORD:-alexwow};"
      # Vikunja (дашборд срез 2 + M12 Spell QA тикеты). Токен LAN-сервера; .env стирается деплоем, поэтому здесь.
      Web__Vikunja__BaseUrl: "https://tasks.home.srv"
      Web__Vikunja__Token: "tk_REDACTED"
      Web__Vikunja__ProjectId: "11"
      Web__Vikunja__VerifySsl: "false"
    ports:
      - "8090:8080"   # HTTP; наружу (alexwow.home.srv) проксирует Caddy на 192.168.2.210:8090
    volumes:
      # Ключи Data Protection (cookie/antiforgery) в named-volume — переживают пересборку
      # контейнера, иначе каждый деплой разлогинивал бы всех.
      - alexwow-web-keys:/root/.aspnet/DataProtection-Keys
    depends_on:
      alexwow-mysql:
        condition: service_healthy
    networks:
      - alexwow

volumes:
  alexwow-mysql-data:
  alexwow-web-keys:

networks:
  alexwow:
    driver: bridge

# AlexWoW — стек для домашнего сервера (homeserver, 192.168.2.210).
# Сборка ЛОКАЛЬНАЯ (см. deploy/deploy.ps1): образы только COPY готовых бинарников.
services:
  alexwow-mysql:
    image: mysql:8.4
    container_name: alexwow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-<rotate-me>}
      MYSQL_DATABASE: alexwow_auth
      MYSQL_USER: ${MYSQL_USER:-alexwow}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-alexwow}
    ports:
      - "3306:3306"   # MySQL наружу — подключение с LAN (DBeaver/Workbench и т.п.)
    volumes:
      - alexwow-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-<rotate-me>}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - alexwow

  alexwow-auth:
    build:
      context: .
      dockerfile: Dockerfile.auth
    container_name: alexwow-auth
    restart: unless-stopped
    environment:
      AuthServer__ConnectionString: "Server=alexwow-mysql;Port=3306;Database=alexwow_auth;User ID=${MYSQL_USER:-alexwow};Password=${MYSQL_PASSWORD:-alexwow};"
      # IP world-сервера, который увидит клиент (LAN-адрес homeserver).
      AuthServer__DefaultRealm__Address: ${REALM_ADDRESS:-192.168.2.210}
    ports:
      - "3724:3724"   # сырой TCP логин-протокола
    depends_on:
      alexwow-mysql:
        condition: service_healthy
    networks:
      - alexwow

  alexwow-world:
    build:
      context: .
      dockerfile: Dockerfile.world
    container_name: alexwow-world
    restart: unless-stopped
    environment:
      WorldServer__ConnectionString: "Server=alexwow-mysql;Port=3306;Database=alexwow_auth;User ID=${MYSQL_USER:-alexwow};Password=${MYSQL_PASSWORD:-alexwow};"
      # БД мира (дамп CMaNGOS): creature, creature_template …
      WorldServer__WorldConnectionString: "Server=alexwow-mysql;Port=3306;Database=mangos;User ID=${MYSQL_USER:-alexwow};Password=${MYSQL_PASSWORD:-alexwow};"
      # Рельеф: каталог с maps/*.map (экстрактор CMaNGOS). Пусто/нет каталога — без рельефа.
      WorldServer__MapsPath: "/data/maps"
    ports:
      - "8085:8085"   # сырой TCP world-протокола
    volumes:
      # Карты на хосте, ВНЕ каталога деплоя (deploy.ps1 делает rm -rf деплой-каталога!).
      # Пользователь кладёт maps/*.map в /data/docker/alexwow-maps на сервере.
      - /data/docker/alexwow-maps:/data/maps:ro
    depends_on:
      alexwow-mysql:
        condition: service_healthy
    networks:
      - alexwow

volumes:
  alexwow-mysql-data:

networks:
  alexwow:
    driver: bridge
